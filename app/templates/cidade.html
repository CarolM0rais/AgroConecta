{% extends 'base.html' %}

{% block title %}Cidades{% endblock %}

{% block content %}
<h2>Cidades</h2>
<a href="{% url 'cidade-create' %}" class="btn btn-success mb-3">Nova Cidade</a>

<table class="table table-striped">
    <thead>
        <tr><th>Nome</th><th>UF</th></tr>
    </thead>
    <tbody>
        {% for cidade in cidades %}
            <tr>
                <td>{{ cidade.nome }}</td>
                <td>{{ cidade.uf }}</td>
            </tr>
        {% empty %}
            <tr><td colspan="2">Nenhuma cidade cadastrada.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
