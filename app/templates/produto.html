{% extends 'base.html' %}

{% block title %}Produtos{% endblock %}

{% block content %}
<h2>Produtos</h2>
<a href="{% url 'produto-create' %}" class="btn btn-success mb-3">Novo Produto</a>

<div class="list-group">
    {% for produto in produtos %}
        <a href="{% url 'produto-detalhe' produto.id %}" class="list-group-item list-group-item-action d-flex align-items-center">
            {% if produto.foto %}
                <img src="{{ produto.foto.url }}" alt="{{ produto.nome }}" class="img-thumbnail me-3" style="width: 80px; height: 80px; object-fit: contain;">
            {% else %}
                <div class="img-thumbnail me-3" style="width: 80px; height: 80px; background-color: #eee; display: flex; align-items: center; justify-content: center; color: #999;">
                    Sem imagem
                </div>
            {% endif %}
            <div>
                <h5 class="mb-0">{{ produto.nome }}</h5>
            </div>
        </a>
    {% empty %}
        <p>Nenhum produto cadastrado.</p>
    {% endfor %}
</div>

{% endblock %}
