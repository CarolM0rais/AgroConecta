{% extends 'base.html' %}

{% block title %}Clientes{% endblock %}

{% block content %}
    <h1>Lista de Clientes</h1>
    <ul>
        {% for cliente in clientes %}
            <li>{{ cliente.nome }}</li>
        {% empty %}
            <li>Nenhum cliente cadastrado.</li>
        {% endfor %}
    </ul>
    <a href="{% url 'index' %}">Voltar para a Home</a>
{% endblock %}
